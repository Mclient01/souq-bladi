<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سوق بلادي | Souq Bladi</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== VARIABLES ===== */
:root {
  --red: #E8001C;
  --red-d: #b50017;
  --red-l: #ff3347;
  --gold: #F5A623;
  --gold-l: #FFD166;
  --dark: #111827;
  --bg: #F3F4F6;
  --white: #ffffff;
  --text: #1F2937;
  --muted: #6B7280;
  --border: #E5E7EB;
  --green: #10B981;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
  --radius: 12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:'Cairo',sans-serif;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'Cairo',sans-serif;outline:none}

/* ===== TOPBAR ===== */
.topbar{background:var(--dark);color:#9CA3AF;font-size:11px;padding:6px 24px;display:flex;justify-content:space-between;align-items:center}
.topbar a{color:#D1D5DB;margin:0 6px;transition:color .2s}.topbar a:hover{color:var(--gold)}

/* ===== CURRENCY BAR ===== */
.currency-bar{background:linear-gradient(90deg,#0F172A,#1E3A5F,#0F172A);padding:7px 20px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.cb-label{color:#93C5FD;font-size:11px;font-weight:700}
.cb-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.cb-btn{padding:4px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;color:#CBD5E1;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Cairo',sans-serif}
.cb-btn:hover{border-color:var(--gold);color:var(--gold)}
.cb-btn.active{background:var(--gold);color:var(--dark);border-color:var(--gold)}
.cb-rate{color:#475569;font-size:10px;padding:3px 8px;background:rgba(255,255,255,0.05);border-radius:10px}

/* ===== HEADER ===== */
header{background:var(--red);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(232,0,28,.4)}
.logo{font-size:26px;font-weight:900;color:white;white-space:nowrap;display:flex;align-items:center;gap:6px}
.logo span{color:var(--gold-l)}
.search-wrap{flex:1;display:flex;max-width:640px}
.search-wrap input{flex:1;padding:10px 16px;border:none;border-radius:6px 0 0 6px;font-size:13px;font-family:'Cairo',sans-serif;direction:rtl}
.search-wrap button{padding:10px 18px;background:var(--gold);border-radius:0 6px 6px 0;font-size:17px;transition:background .2s}
.search-wrap button:hover{background:var(--gold-l)}
.h-actions{display:flex;gap:14px;align-items:center;margin-right:auto}
.h-btn{color:white;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;opacity:.9;transition:opacity .2s;position:relative}
.h-btn:hover{opacity:1}
.h-btn .ic{font-size:19px}
.cart-badge{background:var(--gold);color:var(--dark);font-size:9px;font-weight:900;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;position:absolute;top:-8px;left:-6px}

/* ===== NAV ===== */
nav{background:#C8001A;padding:0 16px;display:flex;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav a{color:rgba(255,255,255,.85);font-size:12px;font-weight:700;padding:9px 14px;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
nav a:hover,nav a.active{color:var(--gold-l);border-bottom-color:var(--gold-l);background:rgba(0,0,0,.12)}

/* ===== HERO ===== */
.hero{display:grid;grid-template-columns:200px 1fr 160px;gap:10px;padding:14px 20px;max-width:1280px;margin:0 auto;align-items:stretch}
.cat-sidebar{background:white;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.cat-item{padding:10px 12px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;border-bottom:1px solid #F9FAFB;transition:all .2s;font-weight:600}
.cat-item:hover{background:#FEF2F2;color:var(--red);padding-right:18px;font-weight:700}
.cat-item:active{background:#FEE2E2}
.cat-item .ci{font-size:16px}
.cat-item .ca{color:#D1D5DB;font-size:10px;margin-right:auto}

.main-banner{border-radius:var(--radius);overflow:hidden;background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 50%,#0F172A 100%);display:flex;align-items:center;padding:28px 32px;min-height:260px;position:relative}
.mb-deco{position:absolute;left:20px;font-size:130px;opacity:.06;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.mb-content{z-index:2}
.mb-tag{background:var(--gold);color:var(--dark);font-size:10px;font-weight:900;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
.mb-title{font-size:34px;font-weight:900;color:white;line-height:1.15;margin-bottom:6px}
.mb-title span{color:var(--gold-l)}
.mb-sub{color:#94A3B8;font-size:12px;margin-bottom:18px;line-height:1.6}
.mb-btn{background:var(--red);color:white;padding:11px 24px;border-radius:8px;font-weight:700;font-size:13px;display:inline-block;transition:all .2s;box-shadow:0 4px 15px rgba(232,0,28,.4)}
.mb-btn:hover{background:var(--red-l);transform:translateY(-2px)}

.mini-col{display:flex;flex-direction:column;gap:8px;min-width:150px}
.mini-b{border-radius:var(--radius);padding:16px;flex:1;cursor:pointer;transition:transform .2s;display:flex;flex-direction:column;justify-content:center;min-height:100px}
.mini-b:hover{transform:scale(1.03)}
.mini-b:nth-child(1){background:linear-gradient(135deg,#FF6B6B,#E63946)}
.mini-b:nth-child(2){background:linear-gradient(135deg,#10B981,#059669)}
.mini-b .mi{font-size:30px;margin-bottom:6px;display:block}
.mini-b .mt{color:white;font-weight:700;font-size:14px;display:block}
.mini-b .ms{color:rgba(255,255,255,.8);font-size:11px;margin-top:3px;display:block}

/* ===== PAYMENT SECTION ===== */
.section-wrap{max-width:1280px;margin:0 auto 14px;padding:0 20px}
.section-box{background:white;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--red)}
.section-title{font-size:16px;font-weight:900;color:var(--red)}
.see-all{color:var(--red);font-size:12px;font-weight:700}
.see-all:hover{text-decoration:underline}

.pay-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.pay-card{border:2px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.pay-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.pay-card.d17::before{background:#E8001C}
.pay-card.sob::before{background:#F5A623}
.pay-card.ccp::before{background:#1D4ED8}
.pay-card.tpay::before{background:#10B981}
.pay-card.usd::before{background:#16A34A}
.pay-card.usdt::before{background:#26A17B}
.pay-card:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 8px 24px rgba(232,0,28,.12)}
.pay-card.sel{border-color:var(--red);background:#FEF2F2}
.pc-ico{font-size:30px;margin-bottom:6px}
.pc-name{font-size:13px;font-weight:700;margin-bottom:3px}
.pc-desc{font-size:10px;color:var(--muted);line-height:1.4}
.pc-badge{font-size:9px;padding:2px 7px;border-radius:10px;display:inline-block;margin-top:5px;font-weight:700}

/* ===== FLASH SALE ===== */
.flash-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.flash-title{font-size:18px;font-weight:900;color:var(--red)}
.countdown{display:flex;gap:4px;align-items:center}
.cd-box{background:var(--dark);color:white;padding:3px 9px;border-radius:5px;font-size:16px;font-weight:900;min-width:34px;text-align:center}
.cd-sep{color:var(--red);font-weight:900;font-size:16px}

/* ===== PRODUCTS ===== */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:14px}
.p-card{background:white;border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .25s;border:1.5px solid transparent;position:relative}
.p-card:hover{box-shadow:var(--shadow-lg);border-color:var(--red);transform:translateY(-3px)}
.p-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#F9FAFB,#F3F4F6);display:flex;align-items:center;justify-content:center;font-size:54px;position:relative;overflow:hidden}
.p-img img{width:100%;height:100%;object-fit:cover}
.disc-badge{position:absolute;top:7px;right:7px;background:var(--red);color:white;font-size:10px;font-weight:900;padding:2px 7px;border-radius:4px}
.wish-btn{position:absolute;top:7px;left:7px;width:28px;height:28px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.1);opacity:0;transition:opacity .2s;cursor:pointer}
.p-card:hover .wish-btn{opacity:1}
.add-btn{position:absolute;bottom:0;left:0;right:0;background:var(--red);color:white;font-size:12px;font-weight:700;padding:8px;display:flex;align-items:center;justify-content:center;gap:5px;transform:translateY(100%);transition:transform .25s;font-family:'Cairo',sans-serif;cursor:pointer}
.p-card:hover .add-btn{transform:translateY(0)}
.p-info{padding:10px 11px 11px}
.p-name{font-size:12px;color:var(--text);margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;font-weight:600}
.p-prices{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.p-new{font-size:15px;font-weight:900;color:var(--red)}
.p-old{font-size:11px;color:#D1D5DB;text-decoration:line-through}
.p-stars{color:var(--gold);font-size:11px}
.p-meta{font-size:10px;color:var(--muted)}
.p-ship{font-size:10px;color:var(--green);font-weight:700;margin-top:3px}

/* ===== CART DRAWER ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.cart-panel{position:fixed;right:0;top:0;height:100vh;width:360px;max-width:100vw;background:white;z-index:400;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s;box-shadow:-8px 0 40px rgba(0,0,0,.15)}
.cart-panel.open{transform:translateX(0)}
.cp-head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:2px solid var(--red)}
.cp-title{font-size:17px;font-weight:900}
.cp-close{background:none;font-size:20px;color:var(--muted);transition:color .2s}
.cp-close:hover{color:var(--red)}
.cp-items{flex:1;overflow-y:auto;padding:12px}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:10px}
.cart-empty .ce-ico{font-size:56px}
.ci-item{display:flex;gap:10px;padding:10px;background:#F9FAFB;border-radius:10px;margin-bottom:8px}
.ci-img{width:58px;height:58px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid var(--border);flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:11px;font-weight:600;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ci-price{color:var(--red);font-weight:900;font-size:13px}
.ci-qty{display:flex;align-items:center;gap:6px;margin-top:5px}
.qty-btn{width:24px;height:24px;border:1.5px solid var(--border);background:white;border-radius:5px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-btn:hover{border-color:var(--red);color:var(--red)}
.ci-del{color:#D1D5DB;font-size:15px;cursor:pointer;align-self:flex-start;background:none;transition:color .2s}
.ci-del:hover{color:var(--red)}
.cp-foot{padding:14px;border-top:1px solid var(--border)}
.cp-summary{background:#F9FAFB;border-radius:10px;padding:12px;margin-bottom:10px}
.cs-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;color:var(--muted)}
.cs-total{display:flex;justify-content:space-between;font-size:16px;font-weight:900;color:var(--red);border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.checkout-btn{width:100%;background:var(--red);color:white;padding:13px;border-radius:10px;font-size:14px;font-weight:900;transition:background .2s}
.checkout-btn:hover{background:var(--red-d)}

/* ===== CHECKOUT MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-box{background:white;border-radius:16px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{background:var(--red);color:white;padding:18px 22px;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:900}
.modal-close{background:none;color:white;font-size:22px}
.modal-body{padding:20px}
.form-sec-title{font-size:13px;font-weight:700;color:var(--text);margin:14px 0 10px;display:flex;align-items:center;gap:6px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-label{font-size:11px;color:var(--muted);font-weight:600}
.form-input,.form-select{padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-size:13px;transition:border-color .2s;direction:rtl;font-family:'Cairo',sans-serif}
.form-input:focus,.form-select:focus{border-color:var(--red)}
.pay-methods{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pm-card{border:2px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.pm-card:hover{border-color:var(--red)}
.pm-card.active{border-color:var(--red);background:#FEF2F2}
.pm-card.full{grid-column:1/-1}
.pm-ico{font-size:24px}
.pm-name{font-size:12px;font-weight:700}
.pm-sub{font-size:10px;color:var(--muted)}

/* USDT Panel */
.usdt-panel,.usd-panel{display:none;border-radius:10px;padding:14px;margin-top:8px}
.usdt-panel{background:linear-gradient(135deg,#0D2B1F,#133D2A);border:2px solid #26A17B}
.usd-panel{background:linear-gradient(135deg,#0D2010,#1A3318);border:2px solid #16A34A}
.usdt-panel.show,.usd-panel.show{display:block}
.crypto-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.usdt-panel .crypto-title{color:#26A17B}
.usd-panel .crypto-title{color:#4CAF50}
.crypto-amount{font-size:22px;font-weight:900;margin-bottom:4px}
.usdt-panel .crypto-amount{color:#26A17B}
.usd-panel .crypto-amount{color:#4CAF50}
.crypto-note{font-size:10px;color:#888;line-height:1.5;margin-bottom:10px}
.net-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.net-tag{background:rgba(38,161,123,.15);border:1px solid #26A17B;color:#7DFFD9;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s}
.net-tag.active,.net-tag:hover{background:#26A17B;color:white}
.wallet-addr{background:rgba(0,0,0,.25);border:1px solid #26A17B;border-radius:6px;padding:9px 11px;font-size:10px;color:#7DFFD9;word-break:break-all;font-family:monospace;cursor:pointer;transition:background .2s;direction:ltr}
.wallet-addr:hover{background:rgba(38,161,123,.15)}
.usd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.usd-method{background:rgba(255,255,255,.06);border:1px solid rgba(76,175,80,.3);border-radius:8px;padding:9px;text-align:center;cursor:pointer;transition:all .2s}
.usd-method:hover{border-color:#4CAF50;background:rgba(76,175,80,.1)}
.usd-m-ico{font-size:22px;margin-bottom:3px}
.usd-m-name{font-size:11px;font-weight:700;color:#A5D6A7}
.usd-m-sub{font-size:9px;color:#666}

.order-summary{background:#F9FAFB;border-radius:10px;padding:14px;margin-top:14px}
.os-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--muted)}
.os-total{display:flex;justify-content:space-between;font-size:17px;font-weight:900;color:var(--red);border-top:2px solid var(--border);padding-top:9px;margin-top:6px}
.place-btn{width:100%;background:linear-gradient(135deg,var(--red),var(--red-d));color:white;padding:14px;border-radius:10px;font-size:15px;font-weight:900;margin-top:14px;transition:all .2s;box-shadow:0 6px 20px rgba(232,0,28,.3)}
.place-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(232,0,28,.4)}
.place-btn:disabled{opacity:.6;transform:none}

/* SUCCESS */
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;display:none;align-items:center;justify-content:center}
.success-overlay.open{display:flex}
.success-box{background:white;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%;animation:popIn .4s ease}
.s-ico{font-size:72px;margin-bottom:14px}
.s-title{font-size:24px;font-weight:900;color:var(--green);margin-bottom:6px}
.s-sub{color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:20px}
.s-order{font-size:18px;font-weight:900;color:var(--text);background:#F3F4F6;padding:8px 20px;border-radius:8px;display:inline-block;margin-bottom:16px}
.s-close{background:var(--green);color:white;padding:12px 32px;border-radius:10px;font-size:14px;font-weight:700;transition:background .2s}
.s-close:hover{background:#059669}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:white;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:700;transition:transform .3s;display:flex;align-items:center;gap:7px;box-shadow:0 6px 24px rgba(0,0,0,.25);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.green-t{background:var(--green)}

/* PAYMENT DETAILS IN SUCCESS */
.pay-details{background:#F9FAFB;border-radius:12px;padding:16px;margin:14px 0;text-align:right}
.pd-title{font-size:13px;font-weight:900;color:#374151;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.pd-method{background:white;border:2px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.pd-method.highlight{border-color:var(--red);background:#FEF2F2}
.pd-method-title{font-size:12px;font-weight:900;color:var(--red);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.pd-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px solid #F3F4F6}
.pd-row:last-child{border:none}
.pd-label{color:#6B7280;font-weight:600}
.pd-value{font-weight:700;color:#111827;direction:ltr;font-family:monospace;font-size:11px}
.pd-copy{background:var(--red);color:white;border:none;padding:2px 8px;border-radius:6px;font-size:10px;cursor:pointer;font-family:'Cairo',sans-serif;margin-right:4px}
.pd-note{background:#FFFBEB;border:1px solid #FCD34D;border-radius:8px;padding:10px;font-size:11px;color:#92400E;line-height:1.6;margin-top:8px}
.pd-whatsapp{display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:white;padding:10px;border-radius:10px;font-size:13px;font-weight:700;margin-top:10px;text-decoration:none;transition:background .2s}
.pd-whatsapp:hover{background:#128C7E}
.cod-info{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:12px;font-size:12px;color:#1E40AF;line-height:1.7}

/* FOOTER */
footer{background:var(--dark);color:#6B7280;padding:36px 20px 18px;margin-top:20px}
.footer-grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:28px;margin-bottom:24px}
